<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lenis Smooth Scroll</title>
		<style>
			body {
				margin: 0;
				font-family: sans-serif;
				scroll-behavior: auto;
			}
			nav {
				position: fixed;
				top: 0;
				width: 100%;
				background: #111;
				padding: 1rem;
				display: flex;
				gap: 1rem;
			}
			nav a {
				color: white;
				text-decoration: none;
				font-weight: bold;
			}
			section {
				height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 2rem;
				color: white;
			}
			#home {
				background: #0077ff;
			}
			#about {
				background: #22cc88;
			}
			#contact {
				background: #cc2277;
			}
			#contact1 {
				background: blue;
			}
			#contact2 {
				background: red;
			}
			#contact3 {
				background: yellow;
			}
			#contact4 {
				background: blueviolet;
			}
		</style>
	</head>
	<body>
		<nav>
			<a href="#home" class="navlink">Home</a>
			<a href="#about" class="navlink">About</a>
			<a href="#contact" class="navlink">Contact</a>
			<a href="#contact1" class="navlink">Contact1</a>
			<a href="#contact2" class="navlink">Contact2</a>
			<a href="#contact3" class="navlink">Contact3</a>
			<a href="#contact4" class="navlink">Contact4</a>
		</nav>

		<section id="home">Home</section>
		<section id="about">About</section>
		<section id="contact">Contact</section>
		<section id="contact1">Contact1</section>
		<section id="contact2">Contact2</section>
		<section id="contact3">Contact3</section>
		<section id="contact4">Contact4</section>

		<script src="https://unpkg.com/@studio-freight/lenis"></script>
		<script>
			const lenis = new Lenis();
			function raf(time) {
				lenis.raf(time);
				requestAnimationFrame(raf);
			}
			requestAnimationFrame(raf);

			document.querySelectorAll(".navlink").forEach((link) => {
				link.addEventListener("click", (e) => {
					e.preventDefault();
					const target = document.querySelector(link.getAttribute("href"));
					lenis.scrollTo(target);
				});
			});
		</script>
	</body>
</html>
