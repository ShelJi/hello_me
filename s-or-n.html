<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Yes or No Wheel</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				text-align: center;
				margin-top: 100px;
			}
			#wheel {
				margin: 0 auto 30px;
				width: 150px;
				height: 150px;
				border: 10px solid #333;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 2rem;
				font-weight: bold;
				animation: none;
			}
			@keyframes spin {
				0% {
					transform: rotate(0deg);
				}
				100% {
					transform: rotate(1080deg);
				}
			}
			button {
				padding: 10px 20px;
				font-size: 1.2rem;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<div id="wheel">?</div>
		<button onclick="spinWheel()">Spin the Wheel</button>

		<script>
			function spinWheel() {
				const wheel = document.getElementById("wheel");
				wheel.innerHTML = "?";
				wheel.style.animation = "spin 2s ease-out";

				setTimeout(() => {
					const randResult = Math.round(Math.random());
					wheel.innerHTML = randResult === 1 ? "YES" : "NO";
					wheel.style.animation = "none";
				}, 2000);
			}
		</script>
	</body>
</html>
